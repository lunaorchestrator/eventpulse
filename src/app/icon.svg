<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#D97706"/>
  <!-- Calendar body -->
  <rect x="5" y="9" width="22" height="18" rx="2" fill="#FEF3C7"/>
  <!-- Calendar header -->
  <rect x="5" y="9" width="22" height="6" rx="2" fill="#B45309"/>
  <rect x="5" y="12" width="22" height="3" fill="#B45309"/>
  <!-- Calendar rings -->
  <rect x="10" y="6" width="3" height="6" rx="1.5" fill="#78350F"/>
  <rect x="19" y="6" width="3" height="6" rx="1.5" fill="#78350F"/>
  <!-- Grid dots -->
  <circle cx="10" cy="20" r="1.5" fill="#D97706"/>
  <circle cx="16" cy="20" r="1.5" fill="#D97706"/>
  <circle cx="22" cy="20" r="1.5" fill="#D97706"/>
  <circle cx="10" cy="25" r="1.5" fill="#D97706"/>
  <circle cx="16" cy="25" r="1.5" fill="#FCD34D"/>
  <circle cx="22" cy="25" r="1.5" fill="#D97706"/>
  <!-- Pulse wave -->
  <polyline points="7,22 9,22 11,18 13,26 15,20 17,24 19,22 25,22" fill="none" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
